<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Menu DTH Coffee</title>
</head>
<body>
  <h1>Menu DTH Coffee</h1>
  <h2 id="tableName">Bàn: </h2>

  <!-- Container để hiển thị menu -->
  <div id="menu"></div>

  <script>
    // Lấy tham số "table" từ URL
    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || "Không xác định";

    // Hiển thị tên bàn
    document.getElementById("tableName").textContent = "Bàn: " + table;

    // Đọc dữ liệu từ file menu.json
    fetch('menu.json')
      .then(response => response.json())
      .then(data => {
        let container = document.getElementById("menu");
        data.forEach(item => {
          container.innerHTML += `
            <div class="menu-item">
              <h3>${item.name}</h3>
              <p>Giá: ${item.price} VND / ${item.unit}</p>
              <img src="images/${item.image}" alt="${item.name}">
              <button>Chọn món</button>
            </div>`;
        });
      });
  </script>
</body>
</html>
