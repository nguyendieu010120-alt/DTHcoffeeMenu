<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Menu DTH Coffee</title>
</head>
<body>
  <h1>Menu DTH Coffee</h1>
  <h2 id="tableName">Bàn: </h2>

  <div class="menu-item">
    <h3>Cà phê sữa</h3>
    <p>Giá: 25,000 VND</p>
    <button>Chọn món</button>
  </div>

  <div class="menu-item">
    <h3>Trà đào</h3>
    <p>Giá: 30,000 VND</p>
    <button>Chọn món</button>
  </div>

  <div class="menu-item">
    <h3>Bánh ngọt</h3>
    <p>Giá: 20,000 VND</p>
    <button>Chọn món</button>
  </div>

  <script>
    // Lấy tham số "table" từ URL
    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || "Không xác định";

    // Hiển thị tên bàn
    document.getElementById("tableName").textContent = "Bàn: " + table;
  </script>
</body>
</html>
