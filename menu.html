<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Menu DTH Coffee</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 20px; }
    h1 { text-align: center; }
    .menu-item { border: 1px solid #ccc; padding: 10px; margin: 10px; }
    .menu-item h3 { margin: 0; }
    .menu-item button { background: #4CAF50; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    .menu-item button:hover { background: #45a049; }
  </style>
</head>
<body>
  <h1>Menu DTH Coffee</h1>
  <h2>Bàn: Bàn 1</h2>

  <div class="menu-item">
    <h3>Cà phê sữa</h3>
    <p>Giá: 25,000 VND</p>
    <button onclick="alert('Bạn đã chọn Cà phê sữa cho Bàn 1')">Chọn món</button>
  </div>

  <div class="menu-item">
    <h3>Trà đào</h3>
    <p>Giá: 30,000 VND</p>
    <button onclick="alert('Bạn đã chọn Trà đào cho Bàn 1')">Chọn món</button>
  </div>

  <div class="menu-item">
    <h3>Bánh ngọt</h3>
    <p>Giá: 20,000 VND</p>
    <button onclick="alert('Bạn đã chọn Bánh ngọt cho Bàn 1')">Chọn món</button>
  </div>
</body>
</html>
